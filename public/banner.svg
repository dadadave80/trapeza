<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 400" role="img" aria-label="TRAPEZA·TERM — adaptive portfolio agent on Arc Testnet">
  <title>TRAPEZA·TERM</title>
  <desc>Phosphor-green CRT terminal banner. The money-changer's table, run by an agent. Adaptive portfolio agent on Arc Testnet with onchain reasoning anchor.</desc>

  <defs>
    <!-- CRT scanline texture -->
    <pattern id="scan" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="2" fill="transparent"/>
      <rect y="2" width="4" height="2" fill="#000000" fill-opacity="0.28"/>
    </pattern>
    <!-- Soft phosphor vignette at the top and bottom -->
    <linearGradient id="glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a5f584" stop-opacity="0.04"/>
      <stop offset="50%" stop-color="#a5f584" stop-opacity="0"/>
      <stop offset="100%" stop-color="#a5f584" stop-opacity="0.05"/>
    </linearGradient>
    <!-- Reusable font stack (mono-only, system-resident fallbacks) -->
    <style>
      .mono { font-family: ui-monospace, "JetBrains Mono", "Cascadia Code", "Source Code Pro", Menlo, Consolas, monospace; }
    </style>
  </defs>

  <!-- background -->
  <rect width="1280" height="400" fill="#0a0e08"/>
  <rect width="1280" height="400" fill="url(#glow)"/>
  <rect width="1280" height="400" fill="url(#scan)"/>

  <!-- ───────── TOP BAR ───────── -->
  <line x1="48" y1="62" x2="1232" y2="62" stroke="#5a8c45" stroke-width="1" stroke-dasharray="6,4"/>

  <!-- wordmark badge (amber) -->
  <text class="mono" x="48" y="40" fill="#ffc857" font-size="14" font-weight="700" letter-spacing="3.2">TRAPEZA·TERM</text>
  <text class="mono" x="206" y="40" fill="#5a8c45" font-size="11" letter-spacing="0">v0.5.0 · ARC-TESTNET · 5042002 · USDC-NATIVE GAS</text>

  <!-- right: pulsing live dot + clock -->
  <circle cx="1110" cy="36" r="4" fill="#a5f584">
    <animate attributeName="opacity" values="1;0.35;1" dur="1.6s" repeatCount="indefinite"/>
  </circle>
  <text class="mono" x="1122" y="40" fill="#a5f584" font-size="11" letter-spacing="2.4">LIVE</text>
  <text class="mono" x="1232" y="40" fill="#5a8c45" font-size="11" text-anchor="end">12:34:56Z</text>

  <!-- ───────── HERO (left) ───────── -->
  <text class="mono" x="48" y="110" fill="#5a8c45" font-size="11" letter-spacing="3.2">[01] ADAPTIVE·PORTFOLIO·AGENT</text>

  <!-- "> THE MONEY-" -->
  <text class="mono" x="48" y="178" fill="#5a8c45" font-size="52" font-weight="700">&gt;</text>
  <text class="mono" x="92" y="178" fill="#e8f0e0" font-size="52" font-weight="700" letter-spacing="-1">THE MONEY-</text>
  <!-- "CHANGER'S TABLE," -->
  <text class="mono" x="48" y="232" fill="#e8f0e0" font-size="52" font-weight="700" letter-spacing="-1">CHANGER&apos;S TABLE,</text>
  <!-- "RUN BY AN AGENT." highlighted -->
  <rect x="44" y="250" width="520" height="60" fill="#a5f584"/>
  <text class="mono" x="52" y="296" fill="#0a0e08" font-size="52" font-weight="700" letter-spacing="-1">RUN BY AN AGENT.</text>
  <!-- blinking cursor after the highlight -->
  <text class="mono" x="580" y="296" fill="#a5f584" font-size="52" font-weight="700">_<animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.5;0.5;1" dur="1.1s" repeatCount="indefinite"/></text>

  <!-- subtitle / tagline -->
  <text class="mono" x="48" y="334" fill="#5a8c45" font-size="13">&gt;</text>
  <text class="mono" x="66" y="334" fill="#e8f0e0" font-size="13">groq llama 4 scout · circle dcw · usyc yield baseline · onchain trace anchor</text>

  <!-- ───────── RIGHT PANEL ─────────  fake agent decision card -->
  <text class="mono" x="720" y="110" fill="#5a8c45" font-size="11" letter-spacing="3.2">[02] AGENT·MEMO · 2026-05-25 12:30Z</text>
  <rect x="720" y="125" width="512" height="200" fill="#101510" stroke="#5a8c45" stroke-width="1"/>

  <!-- regime header inside card -->
  <text class="mono" x="736" y="158" fill="#a5f584" font-size="22" font-weight="700" letter-spacing="3">&gt; RISK-ON</text>
  <text class="mono" x="884" y="158" fill="#5a8c45" font-size="11" letter-spacing="2">CONF 78%</text>
  <rect x="970" y="143" width="100" height="20" fill="none" stroke="#a5f584" stroke-width="1"/>
  <text class="mono" x="978" y="158" fill="#a5f584" font-size="10" letter-spacing="2.5">▲ +0.94% · 24H</text>

  <line x1="736" y1="174" x2="1216" y2="174" stroke="#5a8c45" stroke-dasharray="4,4"/>

  <!-- memo prose -->
  <text class="mono" x="736" y="200" fill="#a5f584" font-size="13">&gt;</text>
  <text class="mono" x="754" y="200" fill="#e8f0e0" font-size="13">BTC ripped 4.2% overnight with vol under 2%.</text>
  <text class="mono" x="736" y="220" fill="#e8f0e0" font-size="13">Pushing cirBTC to 35% inside the Balanced band</text>
  <text class="mono" x="736" y="240" fill="#e8f0e0" font-size="13">and parking idle USDC in USYC to capture yield</text>
  <text class="mono" x="736" y="260" fill="#e8f0e0" font-size="13">while we ride this. Holds unless vol passes 3%.</text>

  <line x1="736" y1="279" x2="1216" y2="279" stroke="#5a8c45" stroke-dasharray="4,4"/>

  <!-- footnote line -->
  <text class="mono" x="736" y="302" fill="#a5f584" font-size="11" letter-spacing="2">● EXECUTED</text>
  <text class="mono" x="836" y="302" fill="#ffc857" font-size="11">SWAP·TX 0x55525e…1aaea</text>
  <text class="mono" x="1216" y="302" fill="#5a8c45" font-size="11" text-anchor="end">arcscan ↗</text>
  <text class="mono" x="736" y="320" fill="#5a8c45" font-size="11">TRACE·SHA256 0xdfb00ad1…aa1c75</text>

  <!-- ───────── BOTTOM STRIP ───────── -->
  <line x1="48" y1="354" x2="1232" y2="354" stroke="#5a8c45" stroke-width="1" stroke-dasharray="6,4"/>
  <text class="mono" x="48" y="382" fill="#5a8c45" font-size="11" letter-spacing="2.4">USDC · USYC · EURC · CIRBTC · 4-ASSET BASKET · CRON */15 · GITHUB ACTIONS</text>
  <text class="mono" x="1232" y="382" fill="#5a8c45" font-size="11" letter-spacing="2.4" text-anchor="end">CANTEEN × CIRCLE · RFB-04</text>
</svg>
